<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò chơi Quiz nhỏ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .quiz-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 1.8em;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .option-button {
            background-color: #e0f2ff;
            color: #155dfc;
            border: 2px solid #155dfc;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s ease;
            outline: none;
        }
        .option-button:hover:not(:disabled) {
            background-color: #155dfc;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(21, 93, 252, 0.3);
        }
        .option-button:disabled {
            cursor: default;
        }
        .option-button.correct {
            background-color: #4CAF50; /* Green */
            color: white;
            border-color: #4CAF50;
        }
        .option-button.wrong {
            background-color: #F44336; /* Red */
            color: white;
            border-color: #F44336;
        }
        .result {
            margin-top: 25px;
            font-size: 1.3em;
            font-weight: bold;
        }
        .result.correct-text {
            color: #28a745; /* Green for correct */
        }
        .result.wrong-text {
            color: #dc3545; /* Red for wrong */
        }
        .button-group {
            margin-top: 25px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .reset-btn {
            background-color: #155dfc;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .reset-btn:hover {
            background-color: #1447e6;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(21, 93, 252, 0.3);
        }
        .reset-btn:disabled {
            display: none;
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <h2 id="question">Câu hỏi sẽ hiển thị ở đây</h2>
        <div class="options-container" id="options">
            <button class="option-button" data-index="0">Lựa chọn 1</button>
            <button class="option-button" data-index="1">Lựa chọn 2</button>
            <button class="option-button" data-index="2">Lựa chọn 3</button>
        </div>
        <div class="result" id="result"></div>
        <div class="button-group">
            <button class="reset-btn" id="resetBtn">Làm lại</button>
        </div>
    </div>

    <script>
        const questionElement = document.getElementById('question');
        const optionsContainer = document.getElementById('options');
        const resultElement = document.getElementById('result');
        const resetBtn = document.getElementById('resetBtn');
        let selectedOption = null;
        let hasAnswered = false;

        // Dữ liệu câu hỏi và đáp án
        const quizData = {
            question: "Thủ đô của Việt Nam là thành phố nào?",
            options: ["Đà Nẵng", "Hà Nội", "Hồ Chí Minh"],
            correctAnswerIndex: 1
        };

        // Hàm hiển thị câu hỏi và các lựa chọn
        function loadQuiz() {
            questionElement.textContent = quizData.question;
            optionsContainer.innerHTML = '';
            quizData.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.classList.add('option-button');
                button.textContent = option;
                button.dataset.index = index;
                button.addEventListener('click', () => selectOption(button, index));
                optionsContainer.appendChild(button);
            });
            resultElement.textContent = '';
            resultElement.className = 'result';
            selectedOption = null;
            hasAnswered = false;
            resetBtn.disabled = true; // Hide reset button initially
        }

        // Hàm xử lý khi người dùng chọn một đáp án
        function selectOption(button, index) {
            if (hasAnswered) return;
            
            hasAnswered = true;
            selectedOption = index;

            const allButtons = optionsContainer.querySelectorAll('.option-button');
            
            // Disable all buttons
            allButtons.forEach(btn => {
                btn.disabled = true;
            });

            // Kiểm tra đáp án
            if (selectedOption === quizData.correctAnswerIndex) {
                button.classList.add('correct');
                resultElement.textContent = "Chính xác! Chúc mừng bạn.";
                resultElement.classList.remove('wrong-text');
                resultElement.classList.add('correct-text');
            } else {
                button.classList.add('wrong');
                allButtons[quizData.correctAnswerIndex].classList.add('correct');
                resultElement.textContent = `Sai rồi. Đáp án đúng là: ${quizData.options[quizData.correctAnswerIndex]}.`;
                resultElement.classList.remove('correct-text');
                resultElement.classList.add('wrong-text');
            }

            // Show reset button
            resetBtn.disabled = false;
        }

        // Reset quiz
        resetBtn.addEventListener('click', loadQuiz);

        // Tải quiz khi trang được load
        document.addEventListener('DOMContentLoaded', loadQuiz);
    </script>
</body>
</html>
